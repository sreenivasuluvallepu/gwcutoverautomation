services:
  cutover-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutover-ui
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - ALB_LISTENER_ARN=${ALB_LISTENER_ARN}
      - ALB_TG_KONG_ARN=${ALB_TG_KONG_ARN}
      - ALB_TG_SDP_ONESTREAM_ARN=${ALB_TG_SDP_ONESTREAM_ARN}
      - ALB_TG_EASE_ARN=${ALB_TG_EASE_ARN}
      - ALB_TG_UK_PARTNER_ARN=${ALB_TG_UK_PARTNER_ARN}
      - ALB_RULE_PRIORITY_BASE=${ALB_RULE_PRIORITY_BASE:-1000}
    ports:
      - "8081:8787"
    restart: unless-stopped
